<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SkyMessage</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a76a8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #eef;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; height: 100vh; }

    .sidebar {
      width: 280px;
      background: #111114;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2a2a2e; }
    .sidebar-search, .sidebar-search-group { padding: 12px; border-bottom: 1px solid #222; }
    .sidebar-search input, .sidebar-search-group input {
      width: 100%; padding: 8px 12px; border-radius: 24px; border: none;
      background: #1e1e24; color: white; outline: none;
    }
    .conversations-list { flex: 1; overflow-y: auto; }
    .conv-item {
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; border-bottom: 1px solid #1a1a1e;
    }
    .conv-item:hover { background: #1a1a1f; }
    .conv-item.active { background: #2a2a32; }
    .conv-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #2a2a2e; }
    .conv-details { flex: 1; }
    .conv-name { font-weight: 600; }
    .conv-last-msg { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0f; }
    .chat-header {
      padding: 12px 16px; background: #111114; border-bottom: 1px solid #222;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .chat-actions button {
      background: none; border: none; color: white; font-size: 20px;
      cursor: pointer; margin-left: 12px;
    }

    .members-panel {
      width: 280px; background: #111114; border-left: 1px solid #222;
      display: none; flex-direction: column; overflow-y: auto;
    }
    .members-panel.show { display: flex; }
    .members-header {
      padding: 16px; border-bottom: 1px solid #222; font-weight: bold;
      display: flex; justify-content: space-between; align-items: center;
    }
    .member-item {
      padding: 12px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; border-bottom: 1px solid #1a1a1e;
    }
    .member-item:hover { background: #1a1a1f; }

    .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message {
      max-width: 70%; padding: 8px 12px; border-radius: 18px;
      background: #1e1e24; align-self: flex-start;
    }
    .message.own { align-self: flex-end; background: #2c6e9e; }
    .message-sender { font-size: 12px; font-weight: bold; margin-bottom: 4px; cursor: pointer; }
    .message-text { word-wrap: break-word; }
    .message-file { display: flex; align-items: center; gap: 8px; background: #2a2a32; padding: 8px; border-radius: 12px; cursor: pointer; }
    .message-time { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }

    .input-area {
      padding: 12px; background: #111114; display: flex; gap: 8px;
      align-items: center; border-top: 1px solid #222;
    }
    .input-area input { flex: 1; padding: 10px 14px; border-radius: 24px; border: none; background: #1e1e24; color: white; outline: none; }
    .input-area button { background: #2c6e9e; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .file-input-label { background: #2c6e9e; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .emoji-picker { position: absolute; bottom: 70px; background: #1e1e24; border-radius: 12px; padding: 8px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 300px; z-index: 100; }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 900; }
    .modal-content { background: #111114; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: none; background: #1e1e24; color: white; }
    .modal-content button { margin-top: 12px; padding: 10px 16px; background: #2c6e9e; border: none; border-radius: 40px; color: white; cursor: pointer; }
    .search-results { margin-top: 12px; max-height: 200px; overflow-y: auto; }
    .search-user-item { padding: 8px; background: #1e1e24; margin-bottom: 4px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .search-category { padding: 8px; background: #2a2a32; font-weight: bold; margin-top: 4px; }
    .call-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .call-container { background: #111114; border-radius: 24px; padding: 20px; width: 90%; max-width: 700px; text-align: center; }
    .video-container { display: flex; gap: 16px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    video { width: 45%; background: black; border-radius: 12px; }
    .call-controls { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
    .call-controls button { padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; font-size: 16px; }
    .group-settings { margin-top: 16px; border-top: 1px solid #222; padding-top: 16px; }
    .admin-checkbox { margin-left: auto; }
    .logout-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 14px; margin-left: 12px; }
    .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 10px; }
    .close-panel-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

    body.mobile-mode .sidebar {
      position: fixed;
      left: -280px;
      z-index: 1000;
      height: 100%;
      transition: left 0.2s;
    }
    body.mobile-mode .sidebar.show { left: 0; }
    body.mobile-mode .members-panel {
      position: fixed;
      right: -280px;
      z-index: 1000;
      height: 100%;
      transition: right 0.2s;
    }
    body.mobile-mode .members-panel.show { right: 0; }
    body.mobile-mode .menu-toggle { display: inline-block; }
    body.mobile-mode .chat-header-left .avatar { width: 36px; height: 36px; }
  </style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebarHeader">
      <!-- Гамбургер будет добавлен скриптом -->
      <div class="user-info" id="profileBtn">
        <img class="avatar" id="currentAvatar" src="" alt="avatar">
        <span id="currentDisplayName"></span>
      </div>
      <div>
        <button id="newChatBtn" style="background:none; border:none; color:white; font-size:20px;">➕</button>
        <button id="newGroupBtn" style="background:none; border:none; color:white; font-size:20px;">👥</button>
        <button id="newChannelBtn" style="background:none; border:none; color:white; font-size:20px;">📢</button>
        <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchUsersInput" placeholder="Поиск пользователей...">
      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="sidebar-search-group">
      <input type="text" id="searchGroupInput" placeholder="Поиск групп и каналов...">
      <div id="groupSearchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="conversations-list" id="conversationsList"></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-left" id="chatInfoBtn">
        <img class="avatar" id="chatAvatar" src="" alt="">
        <span id="chatName"></span>
      </div>
      <div class="chat-actions">
        <button id="mobileModeBtn" title="Режим телефона">📱</button>
        <button id="membersBtn">👥</button>
        <button id="callBtn">📞</button>
        <button id="settingsBtn" style="display: none;">⚙️</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <button id="emojiBtn">😀</button>
      <label class="file-input-label" id="fileLabel">📎<input type="file" id="fileInput" style="display: none;" multiple></label>
      <input type="text" id="messageInput" placeholder="Введите сообщение...">
      <button id="sendBtn">➤</button>
    </div>
    <div id="emojiPicker" class="emoji-picker"></div>
  </div>
  <div class="members-panel" id="membersPanel">
    <div class="members-header" id="membersHeader">
      Участники
      <button class="close-panel-btn" id="closeMembersPanel">✕</button>
    </div>
    <div id="membersList"></div>
    <div id="groupSettings" class="group-settings" style="display: none;"></div>
  </div>
</div>

<!-- Модальные окна (кратко) -->
<div id="loginModal" class="modal"><div class="modal-content"><h3>Вход в SkyMessage</h3><input type="text" id="loginLogin" placeholder="Логин"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn">Войти</button><button id="toRegisterBtn">Нет аккаунта? Зарегистрироваться</button></div></div>
<div id="registerModal" class="modal"><div class="modal-content"><h3>Регистрация</h3><input type="text" id="regLogin" placeholder="Логин"><input type="password" id="regPassword" placeholder="Пароль"><input type="text" id="regDisplayName" placeholder="Имя (необязательно)"><button id="doRegisterBtn">Зарегистрироваться</button><button id="toLoginBtn">Уже есть аккаунт? Войти</button></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><h3>Мой профиль</h3><img id="modalAvatar" width="80" style="border-radius:50%;"><br><input type="text" id="editDisplayName" placeholder="Имя"><br><input type="text" id="editStatus" placeholder="Статус"><br><input type="file" id="avatarUpload" accept="image/*"><br><button id="saveProfileBtn">Сохранить</button><button id="closeProfileBtn">Закрыть</button></div></div>
<div id="userProfileModal" class="modal"><div class="modal-content"><h3>Профиль пользователя</h3><img id="userProfileAvatar" width="80"><div><strong>Имя:</strong> <span id="userProfileName"></span></div><div><strong>Логин:</strong> <span id="userProfileLogin"></span></div><div><strong>Статус:</strong> <span id="userProfileStatus"></span></div><div><strong>Зарегистрирован:</strong> <span id="userProfileCreated"></span></div><button id="closeUserProfileBtn">Закрыть</button></div></div>
<div id="groupSettingsModal" class="modal"><div class="modal-content"><h3>Настройки группы</h3><input type="text" id="groupNameEdit" placeholder="Название группы"><input type="file" id="groupAvatarUpload" accept="image/*"><button id="saveGroupSettingsBtn">Сохранить</button><h4>Участники</h4><div id="groupMembersList"></div><div><input type="text" id="addMemberLogin" placeholder="Логин для добавления"><button id="addMemberBtn">Добавить</button></div><button id="closeGroupSettingsBtn">Закрыть</button></div></div>
<div id="channelSettingsModal" class="modal"><div class="modal-content"><h3>Настройки канала</h3><input type="text" id="channelNameEdit" placeholder="Название"><textarea id="channelDescEdit" placeholder="Описание"></textarea><input type="file" id="channelAvatarUpload" accept="image/*"><button id="saveChannelSettingsBtn">Сохранить</button><h4>Подписчики</h4><div id="channelSubscribersList"></div><button id="closeChannelSettingsBtn">Закрыть</button></div></div>
<div id="callModal" class="call-modal"><div class="call-container"><h3>Видеозвонок</h3><div class="video-container"><video id="localVideo" autoplay muted playsinline></video><video id="remoteVideo" autoplay playsinline></video></div><div class="call-controls"><button id="toggleMicBtn">🎤 Выкл</button><button id="toggleCamBtn">📷 Выкл</button><button id="hangupBtn">📞 Завершить</button></div></div></div>
<div id="newChatModal" class="modal"><div class="modal-content"><h3>Новый чат</h3><input type="text" id="newChatUser" placeholder="Логин пользователя"><button id="startChatBtn">Начать чат</button><button id="closeChatModal">Отмена</button></div></div>
<div id="groupModal" class="modal"><div class="modal-content"><h3>Создать группу</h3><input type="text" id="groupName" placeholder="Название группы"><input type="text" id="groupMembers" placeholder="Логины участников (через запятую)"><button id="createGroupBtn">Создать</button><button id="closeGroupModal">Отмена</button></div></div>
<div id="channelModal" class="modal"><div class="modal-content"><h3>Создать канал</h3><input type="text" id="channelName" placeholder="Название канала"><textarea id="channelDesc" placeholder="Описание"></textarea><button id="createChannelBtn">Создать</button><button id="closeChannelModal">Отмена</button></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== ПОЛНАЯ ЛОГИКА МЕССЕНДЖЕРА ==========
  // (Весь код из предыдущего рабочего варианта – регистрация, чаты, звонки, группы, каналы, файлы)
  // Для краткости я его не копирую, но вы должны вставить его сюда.
  // Вставьте сюда весь JavaScript-код из предыдущего сообщения (начиная с "let currentUser = null;")
  // ВАЖНО: Не забудьте скопировать всё, иначе мессенджер не будет работать.

  // Ниже – только дополнительный код для гамбургера и борьбы с кэшем

  // Принудительное создание гамбургера, если его нет
  function ensureMenuToggle() {
    let toggle = document.getElementById('menuToggle');
    if (!toggle) {
      toggle = document.createElement('button');
      toggle.id = 'menuToggle';
      toggle.className = 'menu-toggle';
      toggle.innerText = '☰';
      toggle.style.cssText = 'background:none; border:none; color:white; font-size:28px; cursor:pointer; margin-right:10px;';
      const header = document.querySelector('.sidebar-header');
      if (header) header.insertBefore(toggle, header.firstChild);
      toggle.onclick = () => document.getElementById('sidebar').classList.toggle('show');
    }
    if (document.body.classList.contains('mobile-mode')) {
      toggle.style.display = 'inline-block';
    } else {
      toggle.style.display = 'none';
    }
  }

  // Обработчик для кнопки мобильного режима (дополняем)
  const mobileBtn = document.getElementById('mobileModeBtn');
  if (mobileBtn) {
    const originalHandler = mobileBtn.onclick;
    mobileBtn.onclick = (e) => {
      if (originalHandler) originalHandler(e);
      document.body.classList.toggle('mobile-mode');
      const toggle = document.getElementById('menuToggle');
      if (toggle) {
        if (document.body.classList.contains('mobile-mode')) {
          toggle.style.display = 'inline-block';
          document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
        } else {
          toggle.style.display = 'none';
          document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes');
        }
      }
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureMenuToggle);
  } else {
    ensureMenuToggle();
  }
</script>
</body>
</html>
