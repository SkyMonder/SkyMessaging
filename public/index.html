<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>SkyMessage — как Telegram</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a76a8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #eef;
      height: 100vh;
      overflow: hidden;
    }
    /* Две колонки */
    .app-container {
      display: flex;
      height: 100vh;
    }
    /* Левая панель (список чатов) */
    .chats-panel {
      width: 320px;
      background: #111114;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }
    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #2a2a2e;
    }
    .panel-search {
      padding: 12px;
      border-bottom: 1px solid #222;
    }
    .panel-search input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 24px;
      border: none;
      background: #1e1e24;
      color: white;
      outline: none;
    }
    .chats-list {
      flex: 1;
      overflow-y: auto;
    }
    .chat-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      border-bottom: 1px solid #1a1a1e;
    }
    .chat-item:hover { background: #1a1a1f; }
    .chat-item.active { background: #2a2a32; }
    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #2a2a2e;
    }
    .chat-info {
      flex: 1;
    }
    .chat-name {
      font-weight: 600;
    }
    .chat-last-msg {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Правая область (чат) */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0f;
    }
    .chat-header {
      padding: 12px 16px;
      background: #111114;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .back-button {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      margin-right: 8px;
    }
    .chat-actions button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      margin-left: 12px;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 18px;
      background: #1e1e24;
      align-self: flex-start;
    }
    .message.own {
      align-self: flex-end;
      background: #2c6e9e;
    }
    .message-sender {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .message-text { word-wrap: break-word; }
    .message-file {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2a2a32;
      padding: 8px;
      border-radius: 12px;
      cursor: pointer;
    }
    .message-time {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
      text-align: right;
    }
    .input-area {
      padding: 12px;
      background: #111114;
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 1px solid #222;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: none;
      background: #1e1e24;
      color: white;
      outline: none;
    }
    .input-area button {
      background: #2c6e9e;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }
    .file-input-label {
      background: #2c6e9e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .emoji-picker {
      position: absolute;
      bottom: 70px;
      background: #1e1e24;
      border-radius: 12px;
      padding: 8px;
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      max-width: 300px;
      z-index: 100;
    }
    /* Модальные окна (кратко) */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 900;
    }
    .modal-content {
      background: #111114;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      background: #1e1e24;
      color: white;
    }
    .modal-content button {
      margin-top: 12px;
      padding: 10px 16px;
      background: #2c6e9e;
      border: none;
      border-radius: 40px;
      color: white;
      cursor: pointer;
    }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 40px; }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
    }
    .search-results {
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .search-user-item {
      padding: 8px;
      background: #1e1e24;
      margin-bottom: 4px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-category {
      padding: 8px;
      background: #2a2a32;
      font-weight: bold;
      margin-top: 4px;
    }
    .call-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
    }
    .call-container {
      background: #111114;
      border-radius: 24px;
      padding: 20px;
      width: 90%;
      max-width: 700px;
      text-align: center;
    }
    .video-container {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    video {
      width: 45%;
      background: black;
      border-radius: 12px;
    }
    .call-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }
    .call-controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
    }
    .call-timer {
      font-size: 14px;
      margin-left: 10px;
      color: #aaa;
    }
    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .chats-panel {
        position: fixed;
        left: -320px;
        z-index: 1000;
        height: 100%;
        transition: left 0.2s;
      }
      .chats-panel.show {
        left: 0;
      }
      .back-button {
        display: inline-block;
      }
      .menu-toggle {
        display: block !important;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        margin-right: 10px;
      }
      .panel-header .menu-toggle {
        display: inline-block;
      }
    }
    .menu-toggle {
      display: none;
    }
    .logout-btn {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 14px;
      margin-left: 12px;
    }
    .admin-panel-btn {
      background: #2c6e9e;
      border: none;
      color: white;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 20px;
      cursor: pointer;
      margin-left: 8px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Левая панель (список чатов) -->
  <div class="chats-panel" id="chatsPanel">
    <div class="panel-header">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="user-info" id="profileBtn">
        <img class="avatar" id="currentAvatar" src="">
        <span id="currentDisplayName"></span>
      </div>
      <div>
        <button id="newChatBtn" style="background:none; border:none; color:white; font-size:20px;">➕</button>
        <button id="newGroupBtn" style="background:none; border:none; color:white; font-size:20px;">👥</button>
        <button id="newChannelBtn" style="background:none; border:none; color:white; font-size:20px;">📢</button>
        <button id="adminPanelBtn" class="admin-panel-btn" style="display: none;">👑</button>
        <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
      </div>
    </div>
    <div class="panel-search">
      <input type="text" id="searchUsersInput" placeholder="Поиск пользователей...">
      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="panel-search">
      <input type="text" id="searchGroupInput" placeholder="Поиск групп и каналов...">
      <div id="groupSearchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="chats-list" id="chatsList"></div>
  </div>

  <!-- Правая область (чат) -->
  <div class="chat-area" id="chatArea">
    <div class="chat-header">
      <div class="chat-header-left" id="chatInfoBtn">
        <button class="back-button" id="backButton">←</button>
        <img class="avatar" id="chatAvatar" src="" style="width:36px;height:36px;">
        <div>
          <span id="chatName"></span>
          <span id="chatUserStatus" style="font-size:12px; margin-left:8px; color:#aaa;"></span>
        </div>
      </div>
      <div class="chat-actions">
        <button id="membersBtn">👥</button>
        <button id="audioCallBtn" title="Аудиозвонок">🎙️</button>
        <button id="videoCallBtn" title="Видеозвонок">📹</button>
        <button id="settingsBtn" style="display: none;">⚙️</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <button id="emojiBtn">😀</button>
      <label class="file-input-label" id="fileLabel">📎<input type="file" id="fileInput" style="display: none;" multiple></label>
      <input type="text" id="messageInput" placeholder="Введите сообщение...">
      <button id="sendBtn">➤</button>
    </div>
    <div id="emojiPicker" class="emoji-picker"></div>
  </div>
</div>

<!-- Модальные окна -->
<div id="loginModal" class="modal"><div class="modal-content"><h3>Вход в SkyMessage</h3><input type="text" id="loginLogin" placeholder="Логин" maxlength="30"><div class="password-wrapper"><input type="password" id="loginPassword" placeholder="Пароль"><span class="toggle-password" data-target="loginPassword">👁️</span></div><button id="doLoginBtn">Войти</button><button id="toRegisterBtn">Нет аккаунта? Зарегистрироваться</button></div></div>
<div id="registerModal" class="modal"><div class="modal-content"><h3>Регистрация</h3><input type="text" id="regLogin" placeholder="Логин" maxlength="30"><div class="password-wrapper"><input type="password" id="regPassword" placeholder="Пароль"><span class="toggle-password" data-target="regPassword">👁️</span></div><input type="text" id="regDisplayName" placeholder="Имя (необязательно)" maxlength="50"><button id="doRegisterBtn">Зарегистрироваться</button><button id="toLoginBtn">Уже есть аккаунт? Войти</button></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><h3>Мой профиль</h3><img id="modalAvatar" width="80" style="border-radius:50%;"><br><input type="text" id="editDisplayName" placeholder="Имя" maxlength="50"><br><input type="text" id="editStatus" placeholder="Статус" maxlength="30"><br><input type="file" id="avatarUpload" accept="image/*"><br><button id="saveProfileBtn">Сохранить</button><button id="closeProfileBtn">Закрыть</button></div></div>
<div id="userProfileModal" class="modal"><div class="modal-content"><h3>Профиль пользователя</h3><img id="userProfileAvatar" width="80"><div><strong>Имя:</strong> <span id="userProfileName"></span></div><div><strong>Логин:</strong> <span id="userProfileLogin"></span></div><div><strong>Статус:</strong> <span id="userProfileStatus"></span></div><div><strong>Был(а) в сети:</strong> <span id="userProfileLastSeen"></span></div><div><strong>Зарегистрирован:</strong> <span id="userProfileCreated"></span></div><button id="closeUserProfileBtn">Закрыть</button></div></div>
<div id="groupSettingsModal" class="modal"><div class="modal-content"><h3>Настройки группы</h3><input type="text" id="groupNameEdit" placeholder="Название группы" maxlength="50"><input type="file" id="groupAvatarUpload" accept="image/*"><button id="saveGroupSettingsBtn">Сохранить</button><h4>Участники</h4><div id="groupMembersList"></div><div><input type="text" id="addMemberLogin" placeholder="Логин для добавления"><button id="addMemberBtn">Добавить</button></div><button id="closeGroupSettingsBtn">Закрыть</button></div></div>
<div id="channelSettingsModal" class="modal"><div class="modal-content"><h3>Настройки канала</h3><input type="text" id="channelNameEdit" placeholder="Название" maxlength="50"><textarea id="channelDescEdit" placeholder="Описание" maxlength="200"></textarea><input type="file" id="channelAvatarUpload" accept="image/*"><button id="saveChannelSettingsBtn">Сохранить</button><h4>Подписчики</h4><div id="channelSubscribersList"></div><button id="closeChannelSettingsBtn">Закрыть</button></div></div>
<div id="adminModal" class="modal"><div class="modal-content"><h3>Панель администратора</h3><div style="display: flex; gap: 10px; margin-bottom: 16px;"><button id="adminUsersTab">Пользователи</button><button id="adminGroupsTab">Группы</button><button id="adminChannelsTab">Каналы</button></div><div id="adminUsersPanel" style="display: none;"><h4>Пользователи</h4><div id="adminUsersList" style="max-height: 300px; overflow-y: auto;"></div></div><div id="adminGroupsPanel" style="display: none;"><h4>Группы</h4><div id="adminGroupsList"></div></div><div id="adminChannelsPanel" style="display: none;"><h4>Каналы</h4><div id="adminChannelsList"></div></div><button id="closeAdminModal">Закрыть</button></div></div>
<div id="callModal" class="call-modal"><div class="call-container"><h3 id="callerName">Звонок <span id="callTimer" class="call-timer">00:00</span></h3><div class="video-container"><video id="localVideo" autoplay muted playsinline></video><video id="remoteVideo" autoplay playsinline></video></div><div class="call-controls call-controls-incoming" id="incomingControls"><button id="acceptCallBtn">Принять</button><button id="rejectCallBtn">Отклонить</button></div><div class="call-controls call-controls-active" id="activeCallControls" style="display: none;"><button id="toggleMicBtn">🎤 Выкл</button><button id="toggleCamBtn">📷 Выкл</button><button id="hangupBtn">📞 Завершить</button></div></div></div>
<div id="newChatModal" class="modal"><div class="modal-content"><h3>Новый чат</h3><input type="text" id="newChatUser"><button id="startChatBtn">Начать</button><button id="closeChatModal">Отмена</button></div></div>
<div id="groupModal" class="modal"><div class="modal-content"><h3>Создать группу</h3><input type="text" id="groupName" placeholder="Название группы" maxlength="50"><input type="text" id="groupMembers" placeholder="Логины через запятую"><button id="createGroupBtn">Создать</button><button id="closeGroupModal">Отмена</button></div></div>
<div id="channelModal" class="modal"><div class="modal-content"><h3>Создать канал</h3><input type="text" id="channelName" placeholder="Название канала" maxlength="50"><textarea id="channelDesc" placeholder="Описание" maxlength="200"></textarea><button id="createChannelBtn">Создать</button><button id="closeChannelModal">Отмена</button></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
  let currentUser = null;
  let token = localStorage.getItem('token');
  let socket = null;
  let currentConvId = null;
  let currentConvType = null;
  let currentCall = { active: false, peerConnection: null, targetUserId: null, localStream: null, callType: null };
  let usersCache = {};
  let groupsCache = {};
  let channelsCache = {};
  let currentMessages = [];
  let callTimerInterval = null;
  let callStartTime = null;
  let conversations = { private: [], groups: [], channels: [] };
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
  function showModal(id) { document.getElementById(id).style.display = 'flex'; }
  function hideModal(id) { document.getElementById(id).style.display = 'none'; }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

  function showNotification(title, body) {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") {
      new Notification(title, { body, icon: '/icon-192.png' });
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then(perm => {
        if (perm === "granted") new Notification(title, { body });
      });
    }
  }

  function updateProfileUI() {
    if (!currentUser) return;
    document.getElementById('currentDisplayName').innerText = currentUser.displayName;
    document.getElementById('currentAvatar').src = currentUser.avatar || '';
    document.getElementById('modalAvatar').src = currentUser.avatar || '';
    document.getElementById('editDisplayName').value = currentUser.displayName;
    document.getElementById('editStatus').value = currentUser.status || '';
  }

  // ==================== API ВЫЗОВЫ ====================
  async function login(login, password) {
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password }) });
    if (!res.ok) { alert('Неверный логин или пароль'); return false; }
    const data = await res.json();
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('token', token);
    connectSocket();
    updateProfileUI();
    loadConversations();
    hideModal('loginModal');
    if (currentUser.isSuperAdmin) document.getElementById('adminPanelBtn').style.display = 'inline-block';
    else document.getElementById('adminPanelBtn').style.display = 'none';
    return true;
  }

  async function register(login, password, displayName) {
    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password, displayName }) });
    if (!res.ok) { alert('Ошибка регистрации'); return false; }
    alert('Регистрация успешна, теперь войдите');
    showModal('loginModal');
    hideModal('registerModal');
    return true;
  }

  async function loadCurrentUser() {
    if (!token) return null;
    const res = await fetch('/me', { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.ok) {
      const user = await res.json();
      currentUser = user;
      updateProfileUI();
      if (currentUser.isSuperAdmin) document.getElementById('adminPanelBtn').style.display = 'inline-block';
      else document.getElementById('adminPanelBtn').style.display = 'none';
      return user;
    } else {
      localStorage.removeItem('token');
      token = null;
      return null;
    }
  }

  // ==================== АДМИН-ПАНЕЛЬ ====================
  async function loadAdminUsers() {
    const res = await fetch('/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) { alert('Ошибка загрузки пользователей'); return; }
    const users = await res.json();
    const container = document.getElementById('adminUsersList');
    container.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.alignItems = 'center'; div.style.padding = '8px'; div.style.borderBottom = '1px solid #222';
      div.innerHTML = `<span>${escapeHtml(u.displayName)} (@${escapeHtml(u.login)}) - ${u.status} ${u.banned ? '🔴 Забанен' : '🟢 Активен'}</span>`;
      const btn = document.createElement('button');
      btn.innerText = u.banned ? 'Разбанить' : 'Забанить';
      btn.style.background = u.banned ? '#4caf50' : '#f44336';
      btn.style.border = 'none'; btn.style.padding = '4px 12px'; btn.style.borderRadius = '20px'; btn.style.cursor = 'pointer';
      btn.onclick = async () => {
        const endpoint = u.banned ? '/admin/unban' : '/admin/ban';
        const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, userIdToBan: u.id }) });
        if (res.ok) {
          alert(u.banned ? 'Пользователь разбанен' : 'Пользователь забанен');
          loadAdminUsers();
        } else alert('Ошибка');
      };
      div.appendChild(btn);
      container.appendChild(div);
    });
  }

  async function loadAdminGroups() {
    const res = await fetch('/admin/groups', { headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) { alert('Ошибка загрузки групп'); return; }
    const groups = await res.json();
    const container = document.getElementById('adminGroupsList');
    container.innerHTML = '';
    groups.forEach(g => {
      const div = document.createElement('div');
      div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.alignItems = 'center'; div.style.padding = '8px'; div.style.borderBottom = '1px solid #222';
      div.innerHTML = `<span>${escapeHtml(g.name)} (участников: ${g.memberCount})</span>`;

  function connectSocket() {
    if (socket) socket.disconnect();
    socket = io({ auth: { token } });
    socket.on('connect', () => console.log('Socket connected'));
    socket.on('conversations', (convs) => {
      conversations = convs;
      renderChatsList();
    });
    socket.on('new-message', ({ convId, message }) => {
      if (currentConvId === convId) {
        currentMessages.push(message);
        appendMessage(message, message.senderId === currentUser.id);
      }
      if (currentConvId !== convId && message.senderId !== currentUser.id) {
        const sender = usersCache[message.senderId] || { displayName: 'Кто-то' };
        showNotification(`Новое сообщение от ${sender.displayName}`, message.type === 'text' ? message.content : '📎 Файл');
      }
      loadConversations();
    });
    socket.on('profile-updated', (data) => {
      if (data.userId === currentUser.id) { currentUser.displayName = data.displayName; currentUser.avatar = data.avatar; currentUser.status = data.status; updateProfileUI(); }
      if (usersCache[data.userId]) { usersCache[data.userId].displayName = data.displayName; usersCache[data.userId].avatar = data.avatar; usersCache[data.userId].status = data.status; }
      if (currentConvId && currentConvType === 'private') {
        const otherId = currentConvId.split('_').find(id => id !== currentUser.id);
        if (otherId === data.userId) {
          document.getElementById('chatName').innerText = data.displayName;
          document.getElementById('chatAvatar').src = data.avatar || '';
          updateUserStatusIndicator(otherId);
        }
      }
    });
    socket.on('group-created', () => loadConversations());
    socket.on('group-updated', (group) => { groupsCache[group.id] = group; if (currentConvId === group.id) refreshMembersPanel(); loadConversations(); });
    socket.on('channel-created', () => loadConversations());
    socket.on('channel-updated', (channel) => { channelsCache[channel.id] = channel; if (currentConvId === channel.id) refreshMembersPanel(); loadConversations(); });
    socket.on('group-deleted', ({ groupId }) => {
      if (currentConvId === groupId) closeCurrentChat();
      loadConversations();
    });
    socket.on('channel-deleted', ({ channelId }) => {
      if (currentConvId === channelId) closeCurrentChat();
      loadConversations();
    });
    socket.on('banned', () => {
      alert('Ваш аккаунт был забанен. Вы будете перенаправлены на страницу входа.');
      localStorage.removeItem('token');
      token = null;
      location.reload();
    });
    socket.on('incoming-call', async ({ from, offer, callType }) => {
      if (currentCall.active) { socket.emit('call-end', { targetUserId: from }); return; }
      let callerName = from;
      if (!usersCache[from]) {
        const res = await fetch(`/user/${from}`);
        if (res.ok) {
          const user = await res.json();
          usersCache[from] = user;
          callerName = user.displayName;
        }
      } else {
        callerName = usersCache[from].displayName;
      }
      const typeText = callType === 'audio' ? 'аудиозвонок' : 'видеозвонок';
      document.getElementById('callerName').innerHTML = `${typeText} от ${callerName} <span id="callTimer" class="call-timer">00:00</span>`;
      window.pendingCall = { from, offer, callType };
      showIncomingCallControls();
      showModal('callModal');
    });
    socket.on('call-answered', ({ from, answer }) => handleRemoteAnswer(answer));
    socket.on('ice-candidate', ({ from, candidate }) => {
      if (currentCall.peerConnection && currentCall.peerConnection.signalingState !== 'closed') {
        currentCall.peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.warn('ICE add failed', e));
      }
    });
    socket.on('call-ended', () => endCall());
  }

  function renderChatsList() {

  async function startCall(targetUserId, callType, isAnswer = false, offer = null) {
    if (currentCall.active) return;
    currentCall.active = true;
    currentCall.targetUserId = targetUserId;
    currentCall.callType = callType;
    const pc = new RTCPeerConnection({
      iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:global.relay.metered.ca:80", username: "d487eedadce4b89104e12f15", credential: "CrBAPA1jnE0DOzfC" },
        { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "d487eedadce4b89104e12f15", credential: "CrBAPA1jnE0DOzfC" },
        { urls: "turn:global.relay.metered.ca:443", username: "d487eedadce4b89104e12f15", credential: "CrBAPA1jnE0DOzfC" },
        { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "d487eedadce4b89104e12f15", credential: "CrBAPA1jnE0DOzfC" }
      ]
    });
    currentCall.peerConnection = pc;
    pc.onicecandidate = (event) => {
      if (event.candidate) socket.emit('ice-candidate', { targetUserId, candidate: event.candidate });
    };
    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'connected') startTimer();
      if (pc.iceConnectionState === 'failed') { alert('Соединение не установлено'); endCall(); }
    };
    pc.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
    let constraints = { audio: true };
    if (callType === 'video') constraints.video = true;
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    currentCall.localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    if (!isAnswer) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('call-user', { targetUserId, offer: pc.localDescription, callType });
    } else {
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('call-answer', { targetUserId, answer: pc.localDescription });
    }
    showActiveCallControls();
    showModal('callModal');
  }
  function handleRemoteAnswer(answer) { if (currentCall.peerConnection) currentCall.peerConnection.setRemoteDescription(new RTCSessionDescription(answer)); }
  function endCall() {
    if (currentCall.peerConnection) currentCall.peerConnection.close();
    if (currentCall.localStream) currentCall.localStream.getTracks().forEach(t => t.stop());
    currentCall.active = false;
    hideModal('callModal');
    if (currentCall.targetUserId) socket.emit('call-end', { targetUserId: currentCall.targetUserId });
    currentCall.targetUserId = null;
    stopTimer();
    showIncomingCallControls();
  }

    document.getElementById('chatsPanel').classList.toggle('show');
  });
  document.getElementById('backButton').addEventListener('click', () => {
    if (window.innerWidth <= 768) {
      closeCurrentChat();
    } else {
      // на десктопе просто снимаем выделение
    }
  });

  // ==================== ПОКАЗ ПАРОЛЯ ====================
  document.querySelectorAll('.toggle-password').forEach(span => {
    span.addEventListener('click', function() {
      const targetId = this.dataset.target;
      const input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        this.innerText = '🙈';
      } else {
        input.type = 'password';
        this.innerText = '👁️';
      }
    });
  });

  // ==================== АВТОРИЗАЦИЯ ====================
  document.getElementById('doLoginBtn').onclick = () => login(document.getElementById('loginLogin').value, document.getElementById('loginPassword').value);
  document.getElementById('toRegisterBtn').onclick = () => { hideModal('loginModal'); showModal('registerModal'); };
  document.getElementById('doRegisterBtn').onclick = () => register(document.getElementById('regLogin').value, document.getElementById('regPassword').value, document.getElementById('regDisplayName').value);
  document.getElementById('toLoginBtn').onclick = () => { hideModal('registerModal'); showModal('loginModal'); };
  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); token = null; if (socket) socket.disconnect(); currentUser = null; showModal('loginModal'); };

  // ==================== ИНИЦИАЛИЗАЦИЯ ====================
  (async () => {
    if (token) {
      const user = await loadCurrentUser();
      if (user) {
        connectSocket();
        loadConversations();
      } else {
        showModal('loginModal');
      }
    } else {
      showModal('loginModal');
    }
  })();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js?v=' + Date.now())
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.log('Service Worker error:', err));
  }
</script>
</body>
