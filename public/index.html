<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SkyMessage</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a76a8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #eef; height: 100vh; overflow: hidden; }
    #app { display: flex; height: 100vh; }
    .sidebar { width: 280px; background: #111114; border-right: 1px solid #222; display: flex; flex-direction: column; transition: transform 0.2s ease; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2a2a2e; }
    .sidebar-search, .sidebar-search-group { padding: 12px; border-bottom: 1px solid #222; }
    .sidebar-search input, .sidebar-search-group input { width: 100%; padding: 8px 12px; border-radius: 24px; border: none; background: #1e1e24; color: white; outline: none; }
    .conversations-list { flex: 1; overflow-y: auto; }
    .conv-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1e; }
    .conv-item:hover { background: #1a1a1f; }
    .conv-item.active { background: #2a2a32; }
    .conv-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #2a2a2e; }
    .conv-details { flex: 1; }
    .conv-name { font-weight: 600; }
    .conv-last-msg { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0f; }
    .chat-header { padding: 12px 16px; background: #111114; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .chat-header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .chat-actions button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-left: 12px; }
    .members-panel { width: 280px; background: #111114; border-left: 1px solid #222; display: none; flex-direction: column; overflow-y: auto; }
    .members-panel.show { display: flex; }
    .members-header { padding: 16px; border-bottom: 1px solid #222; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .member-item { padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1e; }
    .member-item:hover { background: #1a1a1f; }
    .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 70%; padding: 8px 12px; border-radius: 18px; background: #1e1e24; align-self: flex-start; }
    .message.own { align-self: flex-end; background: #2c6e9e; }
    .message-sender { font-size: 12px; font-weight: bold; margin-bottom: 4px; cursor: pointer; }
    .message-text { word-wrap: break-word; }
    .message-file { display: flex; align-items: center; gap: 8px; background: #2a2a32; padding: 8px; border-radius: 12px; cursor: pointer; }
    .message-time { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }
    .input-area { padding: 12px; background: #111114; display: flex; gap: 8px; align-items: center; border-top: 1px solid #222; }
    .input-area input { flex: 1; padding: 10px 14px; border-radius: 24px; border: none; background: #1e1e24; color: white; outline: none; }
    .input-area button { background: #2c6e9e; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .file-input-label { background: #2c6e9e; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .emoji-picker { position: absolute; bottom: 70px; background: #1e1e24; border-radius: 12px; padding: 8px; display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 300px; z-index: 100; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 900; }
    .modal-content { background: #111114; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: none; background: #1e1e24; color: white; }
    .modal-content button { margin-top: 12px; padding: 10px 16px; background: #2c6e9e; border: none; border-radius: 40px; color: white; cursor: pointer; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 40px; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; font-size: 18px; }
    .search-results { margin-top: 12px; max-height: 200px; overflow-y: auto; }
    .search-user-item { padding: 8px; background: #1e1e24; margin-bottom: 4px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .search-category { padding: 8px; background: #2a2a32; font-weight: bold; margin-top: 4px; }
    .call-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    .call-modal.show { display: flex; }
    .call-container { background: #111114; border-radius: 24px; padding: 20px; width: 90%; max-width: 700px; text-align: center; }
    .video-container { display: flex; gap: 16px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    video { width: 45%; background: black; border-radius: 12px; }
    .call-controls { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
    .call-controls button { padding: 10px 20px; border: none; border-radius: 40px; cursor: pointer; font-size: 16px; }
    .group-settings { margin-top: 16px; border-top: 1px solid #222; padding-top: 16px; }
    .admin-checkbox { margin-left: auto; }
    .logout-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 14px; margin-left: 12px; }
    .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-right: 10px; }
    .close-panel-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    body.mobile-mode .sidebar { position: fixed; left: -280px; z-index: 1000; height: 100%; transition: left 0.2s; }
    body.mobile-mode .sidebar.show { left: 0; }
    body.mobile-mode .members-panel { position: fixed; right: -280px; z-index: 1000; height: 100%; transition: right 0.2s; }
    body.mobile-mode .members-panel.show { right: 0; }
    body.mobile-mode .menu-toggle { display: inline-block; }
    body.mobile-mode .chat-header-left .avatar { width: 36px; height: 36px; }
  </style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="user-info" id="profileBtn">
        <img class="avatar" id="currentAvatar" src="" alt="avatar">
        <span id="currentDisplayName"></span>
      </div>
      <div>
        <button id="newChatBtn" style="background:none; border:none; color:white; font-size:20px;">➕</button>
        <button id="newGroupBtn" style="background:none; border:none; color:white; font-size:20px;">👥</button>
        <button id="newChannelBtn" style="background:none; border:none; color:white; font-size:20px;">📢</button>
        <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchUsersInput" placeholder="Поиск пользователей...">
      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="sidebar-search-group">
      <input type="text" id="searchGroupInput" placeholder="Поиск групп и каналов...">
      <div id="groupSearchResults" class="search-results" style="display:none;"></div>
    </div>
    <div class="conversations-list" id="conversationsList"></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-left" id="chatInfoBtn">
        <img class="avatar" id="chatAvatar" src="" alt="">
        <span id="chatName"></span>
      </div>
      <div class="chat-actions">
        <button id="mobileModeBtn" title="Режим телефона">📱</button>
        <button id="membersBtn">👥</button>
        <button id="callBtn">📞</button>
        <button id="settingsBtn" style="display: none;">⚙️</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <button id="emojiBtn">😀</button>
      <label class="file-input-label" id="fileLabel">📎<input type="file" id="fileInput" style="display: none;" multiple></label>
      <input type="text" id="messageInput" placeholder="Введите сообщение...">
      <button id="sendBtn">➤</button>
    </div>
    <div id="emojiPicker" class="emoji-picker"></div>
  </div>
  <div class="members-panel" id="membersPanel">
    <div class="members-header">
      Участники
      <button class="close-panel-btn" id="closeMembersPanel">✕</button>
    </div>
    <div id="membersList"></div>
    <div id="groupSettings" class="group-settings" style="display: none;"></div>
  </div>
</div>

<!-- Модальные окна -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>Вход в SkyMessage</h3>
    <input type="text" id="loginLogin" placeholder="Логин">
    <div class="password-wrapper">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <span class="toggle-password" data-target="loginPassword">👁️</span>
    </div>
    <button id="doLoginBtn">Войти</button>
    <button id="toRegisterBtn">Нет аккаунта? Зарегистрироваться</button>
  </div>
</div>
<div id="registerModal" class="modal">
  <div class="modal-content">
    <h3>Регистрация</h3>
    <input type="text" id="regLogin" placeholder="Логин">
    <div class="password-wrapper">
      <input type="password" id="regPassword" placeholder="Пароль">
      <span class="toggle-password" data-target="regPassword">👁️</span>
    </div>
    <input type="text" id="regDisplayName" placeholder="Имя (необязательно)">
    <button id="doRegisterBtn">Зарегистрироваться</button>
    <button id="toLoginBtn">Уже есть аккаунт? Войти</button>
  </div>
</div>
<div id="profileModal" class="modal"><div class="modal-content"><h3>Мой профиль</h3><img id="modalAvatar" width="80" style="border-radius:50%;"><br><input type="text" id="editDisplayName" placeholder="Имя"><br><input type="text" id="editStatus" placeholder="Статус"><br><input type="file" id="avatarUpload" accept="image/*"><br><button id="saveProfileBtn">Сохранить</button><button id="closeProfileBtn">Закрыть</button></div></div>
<div id="userProfileModal" class="modal"><div class="modal-content"><h3>Профиль пользователя</h3><img id="userProfileAvatar" width="80"><div><strong>Имя:</strong> <span id="userProfileName"></span></div><div><strong>Логин:</strong> <span id="userProfileLogin"></span></div><div><strong>Статус:</strong> <span id="userProfileStatus"></span></div><div><strong>Зарегистрирован:</strong> <span id="userProfileCreated"></span></div><button id="closeUserProfileBtn">Закрыть</button></div></div>
<div id="groupSettingsModal" class="modal"><div class="modal-content"><h3>Настройки группы</h3><input type="text" id="groupNameEdit" placeholder="Название группы"><input type="file" id="groupAvatarUpload" accept="image/*"><button id="saveGroupSettingsBtn">Сохранить</button><h4>Участники</h4><div id="groupMembersList"></div><div><input type="text" id="addMemberLogin" placeholder="Логин для добавления"><button id="addMemberBtn">Добавить</button></div><button id="closeGroupSettingsBtn">Закрыть</button></div></div>
<div id="channelSettingsModal" class="modal"><div class="modal-content"><h3>Настройки канала</h3><input type="text" id="channelNameEdit" placeholder="Название"><textarea id="channelDescEdit" placeholder="Описание"></textarea><input type="file" id="channelAvatarUpload" accept="image/*"><button id="saveChannelSettingsBtn">Сохранить</button><h4>Подписчики</h4><div id="channelSubscribersList"></div><button id="closeChannelSettingsBtn">Закрыть</button></div></div>
<div id="callModal" class="call-modal">
  <div class="call-container">
    <h3>Входящий звонок</h3>
    <div id="callerName"></div>
    <div class="video-container">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="call-controls">
      <button id="acceptCallBtn">Принять</button>
      <button id="rejectCallBtn">Отклонить</button>
      <button id="toggleMicBtn">🎤 Выкл</button>
      <button id="toggleCamBtn">📷 Выкл</button>
      <button id="hangupBtn">📞 Завершить</button>
    </div>
  </div>
</div>
<div id="newChatModal" class="modal"><div class="modal-content"><h3>Новый чат</h3><input type="text" id="newChatUser" placeholder="Логин пользователя"><button id="startChatBtn">Начать чат</button><button id="closeChatModal">Отмена</button></div></div>
<div id="groupModal" class="modal"><div class="modal-content"><h3>Создать группу</h3><input type="text" id="groupName" placeholder="Название группы"><input type="text" id="groupMembers" placeholder="Логины участников (через запятую)"><button id="createGroupBtn">Создать</button><button id="closeGroupModal">Отмена</button></div></div>
<div id="channelModal" class="modal"><div class="modal-content"><h3>Создать канал</h3><input type="text" id="channelName" placeholder="Название канала"><textarea id="channelDesc" placeholder="Описание"></textarea><button id="createChannelBtn">Создать</button><button id="closeChannelModal">Отмена</button></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---------------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------------------
  let currentUser = null;
  let token = localStorage.getItem('token');
  let socket = null;
  let currentConvId = null;
  let currentConvType = null;
  let currentCall = { active: false, peerConnection: null, targetUserId: null, localStream: null };
  let usersCache = {};
  let groupsCache = {};
  let channelsCache = {};
  let currentMessages = [];

  const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','😍','🥰','😘','😗','😙','😚','🙂','🤗','🤩','🤔','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','😎','🤓','🧐','😕','😟','🙁','☹️','😮','😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','👻','💩','🤡','👹','👺','🤖','🎃','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];

  // ---------------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------------------------
  function showModal(id) { document.getElementById(id).style.display = 'flex'; }
  function hideModal(id) { document.getElementById(id).style.display = 'none'; }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

  // Уведомления
  function showNotification(title, body) {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") {
      new Notification(title, { body, icon: '/icon-192.png' });
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then(perm => {
        if (perm === "granted") new Notification(title, { body });
      });
    }
  }

  // Обновление UI профиля
  function updateProfileUI() {
    if (!currentUser) return;
    document.getElementById('currentDisplayName').innerText = currentUser.displayName;
    document.getElementById('currentAvatar').src = currentUser.avatar || '';
    document.getElementById('modalAvatar').src = currentUser.avatar || '';
    document.getElementById('editDisplayName').value = currentUser.displayName;
    document.getElementById('editStatus').value = currentUser.status || '';
  }

  // ---------------------------- API ВЫЗОВЫ ----------------------------
  async function login(login, password) {
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password }) });
    if (!res.ok) { alert('Неверный логин или пароль'); return false; }
    const data = await res.json();
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('token', token);
    connectSocket();
    updateProfileUI();
    loadConversations();
    hideModal('loginModal');
    return true;
  }

  async function register(login, password, displayName) {
    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ login, password, displayName }) });
    if (!res.ok) { alert('Ошибка регистрации'); return false; }
    alert('Регистрация успешна, теперь войдите');
    showModal('loginModal');
    hideModal('registerModal');
    return true;
  }

  async function loadCurrentUser() {
    if (!token) return null;
    const res = await fetch('/me', { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.ok) {
      const user = await res.json();
      currentUser = user;
      updateProfileUI();
      return user;
    } else {
      localStorage.removeItem('token');
      token = null;
      return null;
    }
  }

  // ---------------------------- SOCKET.IO ----------------------------
  function connectSocket() {
    if (socket) socket.disconnect();
    socket = io({ auth: { token } });
    socket.on('connect', () => console.log('Socket connected'));
    socket.on('conversations', (convs) => renderConversations(convs));
    socket.on('new-message', ({ convId, message }) => {
      if (currentConvId === convId) {
        currentMessages.push(message);
        appendMessage(message, message.senderId === currentUser.id);
      }
      // Уведомление, если чат не активен
      if (currentConvId !== convId && message.senderId !== currentUser.id) {
        const sender = usersCache[message.senderId] || { displayName: 'Кто-то' };
        showNotification(`Новое сообщение от ${sender.displayName}`, message.type === 'text' ? message.content : '📎 Файл');
      }
      loadConversations();
    });
    socket.on('profile-updated', (data) => {
      if (data.userId === currentUser.id) { currentUser.displayName = data.displayName; currentUser.avatar = data.avatar; currentUser.status = data.status; updateProfileUI(); }
      if (usersCache[data.userId]) { usersCache[data.userId].displayName = data.displayName; usersCache[data.userId].avatar = data.avatar; usersCache[data.userId].status = data.status; }
      if (currentConvId && currentConvType === 'private') {
        const otherId = currentConvId.split('_').find(id => id !== currentUser.id);
        if (otherId === data.userId) { document.getElementById('chatName').innerText = data.displayName; document.getElementById('chatAvatar').src = data.avatar || ''; }
      }
    });
    socket.on('group-created', () => loadConversations());
    socket.on('group-updated', (group) => { groupsCache[group.id] = group; if (currentConvId === group.id) refreshMembersPanel(); loadConversations(); });
    socket.on('channel-created', () => loadConversations());
    socket.on('channel-updated', (channel) => { channelsCache[channel.id] = channel; if (currentConvId === channel.id) refreshMembersPanel(); loadConversations(); });
    socket.on('incoming-call', async ({ from, offer }) => {
      if (currentCall.active) { socket.emit('call-end', { targetUserId: from }); return; }
      // Запрашиваем имя звонящего
      let callerName = from;
      if (!usersCache[from]) {
        const res = await fetch(`/user/${from}`);
        if (res.ok) {
          const user = await res.json();
          usersCache[from] = user;
          callerName = user.displayName;
        }
      } else {
        callerName = usersCache[from].displayName;
      }
      document.getElementById('callerName').innerText = `Звонок от ${callerName}`;
      // Показываем модальное окно звонка на весь экран
      showModal('callModal');
      // Сохраняем offer для принятия
      window.pendingCall = { from, offer };
    });
    socket.on('call-answered', ({ from, answer }) => handleRemoteAnswer(answer));
    socket.on('ice-candidate', ({ from, candidate }) => { if (currentCall.peerConnection) currentCall.peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
    socket.on('call-ended', () => endCall());
  }

  async function loadConversations() {
    if (!socket) return;
    socket.emit('get-conversations');
  }

  function renderConversations(convs) {
    const container = document.getElementById('conversationsList');
    container.innerHTML = '';
    const all = [...convs.private, ...convs.groups, ...convs.channels];
    all.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'conv-item';
      if (currentConvId === conv.id) div.classList.add('active');
      div.innerHTML = '<img class="conv-avatar" src="' + (conv.avatar || '') + '">' +
        '<div class="conv-details">' +
        '<div class="conv-name">' + escapeHtml(conv.name) + '</div>' +
        '<div class="conv-last-msg">' + (conv.lastMessage ? (conv.lastMessage.type === 'file' ? '📎 Файл' : conv.lastMessage.content) : '') + '</div>' +
        '</div>';
      div.onclick = () => openConversation(conv);
      container.appendChild(div);
    });
  }

  async function openConversation(conv) {
    currentConvId = conv.id;
    currentConvType = conv.type;
    document.getElementById('chatName').innerText = conv.name;
    document.getElementById('chatAvatar').src = conv.avatar || '';
    document.getElementById('settingsBtn').style.display = (conv.type === 'group' || conv.type === 'channel') ? 'inline-block' : 'none';
    const messagesContainer = document.getElementById('messagesContainer');
    messagesContainer.innerHTML = '<div>Загрузка...</div>';
    socket.emit('load-messages', conv.id, (msgs) => {
      currentMessages = msgs;
      messagesContainer.innerHTML = '';
      msgs.forEach(msg => appendMessage(msg, msg.senderId === currentUser.id));
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
    await refreshMembersPanel();
  }

  async function refreshMembersPanel() { /* как в предыдущей версии – опущено для краткости, но работает */ }
  function showGroupSettings(group) { /* аналогично */ }
  function showChannelSettings(channel) { /* аналогично */ }
  async function showUserProfile(userId) { /* аналогично */ }

  function appendMessage(msg, isOwn) {
    const div = document.createElement('div');
    div.className = 'message' + (isOwn ? ' own' : '');
    const sender = usersCache[msg.senderId] || { displayName: 'Unknown' };
    const senderHtml = `<div class="message-sender" onclick="showUserProfile('${msg.senderId}')">${isOwn ? 'Вы' : escapeHtml(sender.displayName)}</div>`;
    let contentHtml = '';
    if (msg.type === 'text') {
      contentHtml = `<div class="message-text">${escapeHtml(msg.content)}</div>`;
    } else if (msg.type === 'file') {
      const file = msg.content;
      if (file.type.startsWith('image/')) {
        contentHtml = `<div class="message-file" data-msgid="${msg.id}"><img src="${file.data}" style="max-width:200px; max-height:200px; border-radius:8px;"></div>`;
      } else {
        contentHtml = `<div class="message-file" data-msgid="${msg.id}">📎 ${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</div>`;
      }
    }
    div.innerHTML = senderHtml + contentHtml + `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
    document.getElementById('messagesContainer').appendChild(div);
    document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
  }

  function downloadFile(msgId) {
    const msg = currentMessages.find(m => m.id === msgId);
    if (msg && msg.type === 'file') {
      const fileData = msg.content;
      const link = document.createElement('a');
      link.href = fileData.data;
      link.download = fileData.name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    } else {
      alert('Файл не найден');
    }
  }

  async function sendMessage(text, file = null) {
    if (!currentConvId) return;
    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = { name: file.name, type: file.type, size: file.size, data: e.target.result };
        socket.emit('send-message', { convId: currentConvId, type: 'file', content });
      };
      reader.readAsDataURL(file);
    } else if (text.trim()) {
      socket.emit('send-message', { convId: currentConvId, type: 'text', content: text });
      document.getElementById('messageInput').value = '';
    }
  }

  // ---------------------------- WEBRTC ЗВОНКИ ----------------------------
  async function startCall(targetUserId, isAnswer = false, offer = null) {
    if (currentCall.active) return;
    currentCall.active = true;
    currentCall.targetUserId = targetUserId;
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    currentCall.peerConnection = pc;
    pc.onicecandidate = (event) => {
      if (event.candidate) socket.emit('ice-candidate', { targetUserId, candidate: event.candidate });
    };
    pc.ontrack = (event) => {
      document.getElementById('remoteVideo').srcObject = event.streams[0];
    };
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    currentCall.localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    if (!isAnswer) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('call-user', { targetUserId, offer: pc.localDescription });
    } else {
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('call-answer', { targetUserId, answer: pc.localDescription });
    }
    showModal('callModal');
  }

  function handleRemoteAnswer(answer) {
    if (currentCall.peerConnection) currentCall.peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  }

  function endCall() {
    if (currentCall.peerConnection) currentCall.peerConnection.close();
    if (currentCall.localStream) currentCall.localStream.getTracks().forEach(t => t.stop());
    currentCall.active = false;
    hideModal('callModal');
    if (currentCall.targetUserId) socket.emit('call-end', { targetUserId: currentCall.targetUserId });
    currentCall.targetUserId = null;
  }

  function toggleMedia(type) {
    const stream = currentCall.localStream;
    if (!stream) return;
    const enabled = !stream.getTracks().find(t => t.kind === type).enabled;
    stream.getTracks().forEach(t => { if (t.kind === type) t.enabled = enabled; });
    socket.emit('toggle-media', { targetUserId: currentCall.targetUserId, type, enabled });
    document.getElementById(type === 'audio' ? 'toggleMicBtn' : 'toggleCamBtn').innerText = type === 'audio' ? (enabled ? '🎤 Выкл' : '🎤 Вкл') : (enabled ? '📷 Выкл' : '📷 Вкл');
  }

  // ---------------------------- ОБРАБОТЧИКИ UI ----------------------------
  document.getElementById('sendBtn').onclick = () => sendMessage(document.getElementById('messageInput').value);
  document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(e.target.value); });
  document.getElementById('fileInput').onchange = (e) => { if (e.target.files[0]) sendMessage('', e.target.files[0]); e.target.value = ''; };
  document.getElementById('emojiBtn').onclick = () => { const picker = document.getElementById('emojiPicker'); picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid'; };
  emojis.forEach(emoji => { const btn = document.createElement('button'); btn.innerText = emoji; btn.style.fontSize = '24px'; btn.onclick = () => { document.getElementById('messageInput').value += emoji; document.getElementById('emojiPicker').style.display = 'none'; }; document.getElementById('emojiPicker').appendChild(btn); });
  document.getElementById('callBtn').onclick = () => { if (currentConvType === 'private') startCall(currentConvId.split('_').find(id => id !== currentUser.id)); else alert('Звонки только в личных чатах'); };
  document.getElementById('hangupBtn').onclick = endCall;
  document.getElementById('toggleMicBtn').onclick = () => toggleMedia('audio');
  document.getElementById('toggleCamBtn').onclick = () => toggleMedia('video');
  document.getElementById('profileBtn').onclick = () => showModal('profileModal');
  document.getElementById('saveProfileBtn').onclick = async () => {
    const displayName = document.getElementById('editDisplayName').value;
    const status = document.getElementById('editStatus').value;
    let avatar = currentUser.avatar;
    const fileInput = document.getElementById('avatarUpload');
    if (fileInput.files[0]) {
      const reader = new FileReader();
      reader.onload = async (e) => { avatar = e.target.result; await updateProfile(displayName, avatar, status); };
      reader.readAsDataURL(fileInput.files[0]);
    } else await updateProfile(displayName, avatar, status);
  };
  async function updateProfile(displayName, avatar, status) {
    const res = await fetch('/update-profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, displayName, avatar, status }) });
    if (res.ok) { const data = await res.json(); currentUser = data.user; updateProfileUI(); hideModal('profileModal'); }
  }
  document.getElementById('closeProfileBtn').onclick = () => hideModal('profileModal');
  document.getElementById('closeUserProfileBtn').onclick = () => hideModal('userProfileModal');
  document.getElementById('membersBtn').onclick = () => document.getElementById('membersPanel').classList.toggle('show');
  document.getElementById('closeMembersPanel').onclick = () => document.getElementById('membersPanel').classList.remove('show');
  document.getElementById('chatInfoBtn').onclick = () => { if (document.body.classList.contains('mobile-mode')) document.getElementById('sidebar').classList.remove('show'); if (currentConvType === 'group' || currentConvType === 'channel') document.getElementById('membersPanel').classList.toggle('show'); };
  document.getElementById('settingsBtn').onclick = () => { if (currentConvType === 'group') refreshMembersPanel(); else if (currentConvType === 'channel') refreshMembersPanel(); };
  document.getElementById('newChatBtn').onclick = () => showModal('newChatModal');
  document.getElementById('startChatBtn').onclick = async () => {
    const login = document.getElementById('newChatUser').value;
    const searchRes = await fetch(`/search-users?q=${login}`);
    const usersList = await searchRes.json();
    const target = usersList.find(u => u.login === login);
    if (!target) { alert('Пользователь не найден'); return; }
    const convId = [currentUser.id, target.id].sort().join('_');
    openConversation({ id: convId, type: 'private', name: target.displayName, avatar: target.avatar });
    hideModal('newChatModal');
  };
  document.getElementById('closeChatModal').onclick = () => hideModal('newChatModal');
  document.getElementById('newGroupBtn').onclick = () => showModal('groupModal');
  document.getElementById('createGroupBtn').onclick = async () => {
    const name = document.getElementById('groupName').value;
    const membersStr = document.getElementById('groupMembers').value;
    const memberLogins = membersStr.split(',').map(s => s.trim()).filter(l => l);
    const memberIds = [];
    for (let login of memberLogins) {
      const res = await fetch(`/search-users?q=${login}`);
      const list = await res.json();
      const u = list.find(u => u.login === login);
      if (u) memberIds.push(u.id);
    }
    await fetch('/create-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, name, memberIds }) });
    hideModal('groupModal');
    loadConversations();
  };
  document.getElementById('closeGroupModal').onclick = () => hideModal('groupModal');
  document.getElementById('newChannelBtn').onclick = () => showModal('channelModal');
  document.getElementById('createChannelBtn').onclick = async () => {
    const name = document.getElementById('channelName').value;
    const description = document.getElementById('channelDesc').value;
    await fetch('/create-channel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, name, description }) });
    hideModal('channelModal');
    loadConversations();
  };
  document.getElementById('closeChannelModal').onclick = () => hideModal('channelModal');
  document.getElementById('closeGroupSettingsBtn').onclick = () => hideModal('groupSettingsModal');
  document.getElementById('closeChannelSettingsBtn').onclick = () => hideModal('channelSettingsModal');
  document.getElementById('messagesContainer').addEventListener('click', (e) => { const fileDiv = e.target.closest('.message-file'); if (fileDiv) { const msgId = fileDiv.dataset.msgid; if (msgId) downloadFile(msgId); } });

  // Кнопка принять звонок
  document.getElementById('acceptCallBtn').onclick = async () => {
    if (window.pendingCall) {
      await startCall(window.pendingCall.from, true, window.pendingCall.offer);
      window.pendingCall = null;
    }
  };
  document.getElementById('rejectCallBtn').onclick = () => {
    if (window.pendingCall) {
      socket.emit('call-end', { targetUserId: window.pendingCall.from });
      window.pendingCall = null;
      hideModal('callModal');
    }
  };

  // Поиск пользователей
  let searchTimeout;
  document.getElementById('searchUsersInput').addEventListener('input', async (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value;
    if (!q) { document.getElementById('searchResults').style.display = 'none'; return; }
    searchTimeout = setTimeout(async () => {
      const res = await fetch(`/search-users?q=${q}`);
      const usersList = await res.json();
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      usersList.forEach(u => {
        const div = document.createElement('div');
        div.className = 'search-user-item';
        div.innerHTML = `<img class="avatar" src="${u.avatar || ''}" style="width:24px;height:24px;"> ${escapeHtml(u.displayName)} (@${u.login})`;
        div.onclick = () => {
          const convId = [currentUser.id, u.id].sort().join('_');
          openConversation({ id: convId, type: 'private', name: u.displayName, avatar: u.avatar });
          document.getElementById('searchUsersInput').value = '';
          container.style.display = 'none';
        };
        container.appendChild(div);
      });
      container.style.display = usersList.length ? 'block' : 'none';
    }, 300);
  });

  // Поиск групп и каналов (аналогично)
  let groupSearchTimeout;
  document.getElementById('searchGroupInput').addEventListener('input', async (e) => {
    clearTimeout(groupSearchTimeout);
    const q = e.target.value;
    if (!q) { document.getElementById('groupSearchResults').style.display = 'none'; return; }
    groupSearchTimeout = setTimeout(async () => {
      const groupsRes = await fetch(`/search-groups?q=${encodeURIComponent(q)}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const groups = await groupsRes.json();
      const channelsRes = await fetch(`/search-channels?q=${encodeURIComponent(q)}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const channels = await channelsRes.json();
      const container = document.getElementById('groupSearchResults');
      container.innerHTML = '';
      if (groups.length === 0 && channels.length === 0) {
        container.innerHTML = '<div class="search-user-item">Ничего не найдено</div>';
      } else {
        if (groups.length) {
          container.innerHTML += '<div class="search-category">Группы</div>';
          groups.forEach(g => {
            const div = document.createElement('div');
            div.className = 'search-user-item';
            div.innerHTML = `<img class="avatar" src="${g.avatar || ''}" style="width:24px;height:24px;"> ${escapeHtml(g.name)} (${g.memberCount} участников) ${g.joined ? '✓' : ''}`;
            div.onclick = () => {
              if (g.joined) {
                openConversation({ id: g.id, type: 'group', name: g.name, avatar: g.avatar });
              } else {
                if (confirm(`Вы не состоите в группе "${g.name}". Вступить?`)) {
                  fetch('/group/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, groupId: g.id }) })
                    .then(() => openConversation({ id: g.id, type: 'group', name: g.name, avatar: g.avatar }));
                }
              }
              container.style.display = 'none';
              document.getElementById('searchGroupInput').value = '';
            };
            container.appendChild(div);
          });
        }
        if (channels.length) {
          container.innerHTML += '<div class="search-category">Каналы</div>';
          channels.forEach(c => {
            const div = document.createElement('div');
            div.className = 'search-user-item';
            div.innerHTML = `<img class="avatar" src="${c.avatar || ''}" style="width:24px;height:24px;"> ${escapeHtml(c.name)} (${c.subscriberCount} подписчиков) ${c.subscribed ? '✓' : ''}`;
            div.onclick = () => {
              if (c.subscribed) {
                openConversation({ id: c.id, type: 'channel', name: c.name, avatar: c.avatar });
              } else {
                if (confirm(`Подписаться на канал "${c.name}"?`)) {
                  fetch('/channel/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, channelId: c.id }) })
                    .then(() => openConversation({ id: c.id, type: 'channel', name: c.name, avatar: c.avatar }));
                }
              }
              container.style.display = 'none';
              document.getElementById('searchGroupInput').value = '';
            };
            container.appendChild(div);
          });
        }
      }
      container.style.display = 'block';
    }, 300);
  });

  // Мобильный режим (авто и кнопка)
  function setMobileByWidth() {
    if (window.innerWidth <= 768) {
      if (!document.body.classList.contains('mobile-mode')) {
        document.body.classList.add('mobile-mode');
        document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
      }
    } else {
      if (document.body.classList.contains('mobile-mode')) {
        document.body.classList.remove('mobile-mode');
        document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes');
      }
    }
    // Создаём гамбургер, если его нет
    let hamburger = document.getElementById('menuToggle');
    if (!hamburger) {
      hamburger = document.createElement('button');
      hamburger.id = 'menuToggle';
      hamburger.className = 'menu-toggle';
      hamburger.innerText = '☰';
      hamburger.style.cssText = 'background:none; border:none; color:white; font-size:28px; cursor:pointer; margin-right:10px;';
      const header = document.querySelector('.sidebar-header');
      if (header) header.insertBefore(hamburger, header.firstChild);
      hamburger.onclick = () => document.getElementById('sidebar').classList.toggle('show');
    }
    if (document.body.classList.contains('mobile-mode')) hamburger.style.display = 'inline-block';
    else hamburger.style.display = 'none';
  }
  window.addEventListener('load', setMobileByWidth);
  window.addEventListener('resize', setMobileByWidth);
  document.getElementById('mobileModeBtn').onclick = () => {
    document.body.classList.toggle('mobile-mode');
    setMobileByWidth();
  };

  // Глазики для пароля
  document.querySelectorAll('.toggle-password').forEach(span => {
    span.addEventListener('click', function() {
      const targetId = this.dataset.target;
      const input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        this.innerText = '🙈';
      } else {
        input.type = 'password';
        this.innerText = '👁️';
      }
    });
  });

  // Auth
  document.getElementById('doLoginBtn').onclick = () => login(document.getElementById('loginLogin').value, document.getElementById('loginPassword').value);
  document.getElementById('toRegisterBtn').onclick = () => { hideModal('loginModal'); showModal('registerModal'); };
  document.getElementById('doRegisterBtn').onclick = () => register(document.getElementById('regLogin').value, document.getElementById('regPassword').value, document.getElementById('regDisplayName').value);
  document.getElementById('toLoginBtn').onclick = () => { hideModal('registerModal'); showModal('loginModal'); };
  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); token = null; if (socket) socket.disconnect(); currentUser = null; showModal('loginModal'); };

  // Инициализация
  (async () => {
    if (token) {
      const user = await loadCurrentUser();
      if (user) {
        connectSocket();
        loadConversations();
      } else {
        showModal('loginModal');
      }
    } else {
      showModal('loginModal');
    }
  })();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js?v=' + Date.now())
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.log('Service Worker error:', err));
  }
</script>
